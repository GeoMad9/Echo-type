<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UK Voice Writer</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        body { 
            font-family: 'Roboto', sans-serif; 
            padding: 10px; 
            background: #121212; 
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-clear { padding: 8px 15px; border-radius: 8px; background: #cc0000; color: white; border: none; font-weight: bold; }
        
        textarea { 
            width: 100%; 
            flex-grow: 1;
            padding: 15px; 
            font-size: 22px; 
            border-radius: 12px; 
            border: 2px solid #333;
            background: #1e1e1e;
            color: white;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 10px;
        }

        .banner-container {
            background: #1e1e1e;
            padding: 10px 0;
            border-top: 2px solid #333;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .category-group { display: inline-block; margin: 0 10px; vertical-align: top; }
        .category-label { display: block; font-size: 11px; text-transform: uppercase; color: #007bff; margin-bottom: 8px; font-weight: bold; text-align: center; }
        
        .icon-btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 12px;
            margin-right: 6px;
            min-width: 60px;
        }
        .icon-btn:active { background: #444; transform: scale(0.95); }
        .icon-emoji { font-size: 28px; }
        .icon-text { font-size: 11px; margin-top: 5px; color: #bbb; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight: bold; color: #007bff;">UK FEMALE VOICE</span>
        <button class="btn-clear" onclick="clearText()">CLEAR</button>
    </div>

    <textarea id="editor" placeholder="Type here..."></textarea>

    <div class="banner-container">
        <div class="category-group">
            <span class="category-label">Emotions</span>
            <div class="icon-btn" onclick="speakText('Happy')"><span class="icon-emoji">😊</span><span class="icon-text">Happy</span></div>
            <div class="icon-btn" onclick="speakText('Sad')"><span class="icon-emoji">😢</span><span class="icon-text">Sad</span></div>
            <div class="icon-btn" onclick="speakText('Angry')"><span class="icon-emoji">😠</span><span class="icon-text">Angry</span></div>
            <div class="icon-btn" onclick="speakText('Scared')"><span class="icon-emoji">😨</span><span class="icon-text">Scared</span></div>
            <div class="icon-btn" onclick="speakText('Tired')"><span class="icon-emoji">😴</span><span class="icon-text">Tired</span></div>
        </div>

        <div class="category-group">
            <span class="category-label">School</span>
            <div class="icon-btn" onclick="speakText('Book')"><span class="icon-emoji">📖</span><span class="icon-text">Book</span></div>
            <div class="icon-btn" onclick="speakText('Pencil')"><span class="icon-emoji">✏️</span><span class="icon-text">Pencil</span></div>
            <div class="icon-btn" onclick="speakText('Paper')"><span class="icon-emoji">📄</span><span class="icon-text">Paper</span></div>
            <div class="icon-btn" onclick="speakText('Computer')"><span class="icon-emoji">💻</span><span class="icon-text">Computer</span></div>
            <div class="icon-btn" onclick="speakText('Backpack')"><span class="icon-emoji">🎒</span><span class="icon-text">Bag</span></div>
            <div class="icon-btn" onclick="speakText('Scissors')"><span class="icon-emoji">✂️</span><span class="icon-text">Scissors</span></div>
        </div>

        <div class="category-group">
            <span class="category-label">Clothing</span>
            <div class="icon-btn" onclick="speakText('Shirt')"><span class="icon-emoji">👕</span><span class="icon-text">Shirt</span></div>
            <div class="icon-btn" onclick="speakText('Trousers')"><span class="icon-emoji">👖</span><span class="icon-text">Trousers</span></div>
            <div class="icon-btn" onclick="speakText('Jumper')"><span class="icon-emoji">🧶</span><span class="icon-text">Jumper</span></div>
            <div class="icon-btn" onclick="speakText('Coat')"><span class="icon-emoji">🧥</span><span class="icon-text">Coat</span></div>
            <div class="icon-btn" onclick="speakText('Shoes')"><span class="icon-emoji">👟</span><span class="icon-text">Shoes</span></div>
            <div class="icon-btn" onclick="speakText('Socks')"><span class="icon-emoji">🧦</span><span class="icon-text">Socks</span></div>
        </div>

        <div class="category-group">
            <span class="category-label">Food & Drink</span>
            <div class="icon-btn" onclick="speakText('Apple')"><span class="icon-emoji">🍎</span><span class="icon-text">Apple</span></div>
            <div class="icon-btn" onclick="speakText('Banana')"><span class="icon-emoji">🍌</span><span class="icon-text">Banana</span></div>
            <div class="icon-btn" onclick="speakText('Bread')"><span class="icon-emoji">🍞</span><span class="icon-text">Bread</span></div>
            <div class="icon-btn" onclick="speakText('Milk')"><span class="icon-emoji">🥛</span><span class="icon-text">Milk</span></div>
            <div class="icon-btn" onclick="speakText('Water')"><span class="icon-emoji">💧</span><span class="icon-text">Water</span></div>
            <div class="icon-btn" onclick="speakText('Pizza')"><span class="icon-emoji">🍕</span><span class="icon-text">Pizza</span></div>
            <div class="icon-btn" onclick="speakText('Cookie')"><span class="icon-emoji">🍪</span><span class="icon-text">Cookie</span></div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const synth = window.speechSynthesis;
        let ukVoice = null;

        function findUKVoice() {
            const voices = synth.getVoices();
            ukVoice = voices.find(v => v.lang === 'en-GB' && v.name.toLowerCase().includes('female')) || 
                      voices.find(v => v.lang === 'en-GB');
        }

        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = findUKVoice;

        editor.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.length === 0) return;
            const lastChar = val.charAt(val.length - 1);

            if (lastChar === " " || lastChar === ",") {
                const words = val.trim().split(/\s+/);
                const lastWord = words[words.length - 1].replace(/[^a-zA-Z]/g, "");
                if (lastWord.length > 0) speakText(lastWord);
            }

            if (/[.!?]/.test(lastChar)) {
                const sentences = val.match(/[^.!?]+[.!?]+/g);
                if (sentences) speakText(sentences[sentences.length - 1]);
            }
        });

        function speakText(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (!ukVoice) findUKVoice();
            if (ukVoice) utterance.voice = ukVoice;
            
            utterance.lang = 'en-GB';
            utterance.pitch = 1.3; 
            utterance.rate = 1.0;
            synth.speak(utterance);
        }

        function clearText() {
            if (confirm("Clear all text?")) { editor.value = ''; editor.focus(); }
        }

        findUKVoice();
    </script>
</body>
</html>
